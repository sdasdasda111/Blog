{{ define "main" }}
  <section class="container list-shell">
    <header class="page-hero compact-hero">
      <p class="eyebrow">Search</p>
      <h1>{{ .Title }}</h1>
      <p>{{ .Content }}</p>
    </header>

    <section class="section-card search-shell">
      <input id="search-input" class="search-input" type="search" placeholder="输入标题、摘要或标签进行过滤" />
      <div class="post-feed refined-feed" id="search-results">
        {{ range where .Site.RegularPages "Type" "posts" }}
          <article class="post-card refined-card searchable-card" data-search="{{ lower (printf "%s %s %s" .Title .Summary (delimit .Params.tags " ")) }}">
            <div class="post-card-main">
              <p class="post-date">{{ .Date.Format "2006-01-02" }}</p>
              <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
              <p class="post-summary">{{ .Summary }}</p>
            </div>
            <span class="post-arrow">↗</span>
          </article>
        {{ end }}
      </div>
    </section>
  </section>

  <script>
    const input = document.getElementById('search-input');
    const cards = Array.from(document.querySelectorAll('.searchable-card'));
    input?.addEventListener('input', () => {
      const keyword = input.value.trim().toLowerCase();
      cards.forEach((card) => {
        const text = card.dataset.search || '';
        card.style.display = !keyword || text.includes(keyword) ? '' : 'none';
      });
    });
  </script>
{{ end }}
