{{ define "main" }}
  <article class="post-article">
    <header class="post-hero">
      <p class="eyebrow">Post</p>
      <h1>{{ .Title }}</h1>
      <div class="meta-row">
        <time>{{ .Date.Format "2006-01-02 15:04" }}</time>
        {{ with .Params.tags }}
          <div class="tag-row">
            {{ range . }}
              <a class="tag-chip" href="{{ (printf "/tags/%s/" .) | relURL }}">#{{ . }}</a>
            {{ end }}
          </div>
        {{ end }}
      </div>
    </header>
    <section class="post-content prose">
      {{ .Content }}
    </section>
  </article>
{{ end }}
