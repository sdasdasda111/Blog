{{ define "main" }}
  <section class="container list-shell">
    <header class="page-hero compact-hero">
      <p class="eyebrow">Archive</p>
      <h1>{{ .Title }}</h1>
      <p>{{ .Content }}</p>
    </header>

    <section class="section-card">
      <div class="post-feed refined-feed">
        {{ range .Pages.ByDate.Reverse }}
          <article class="post-card refined-card">
            <div class="post-card-main">
              <p class="post-date">{{ .Date.Format "2006-01-02" }}</p>
              <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
              <p class="post-summary">{{ .Summary }}</p>
            </div>
            <span class="post-arrow">↗</span>
          </article>
        {{ else }}
          <article class="empty-state">暂无内容。</article>
        {{ end }}
      </div>
    </section>
  </section>
{{ end }}
