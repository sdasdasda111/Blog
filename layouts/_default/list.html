{{ define "main" }}
  <section>
    <h1>{{ .Title }}</h1>
    <ul class="post-list">
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          <time>{{ .Date.Format "2006-01-02" }}</time>
        </li>
      {{ else }}
        <li>暂无内容。</li>
      {{ end }}
    </ul>
  </section>
{{ end }}
